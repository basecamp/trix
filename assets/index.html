<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Trix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="csp-nonce" content="topsecret">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" type="text/css" href="trix.css">
    <body style="font-family: sans-serif"></body>
    <link href='https://fonts.googleapis.com' rel='stylesheet'>
    <style type="text/css">
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      }

      main {
        margin: 20px auto;
        max-width: 700px;
      }


      #text-editor-wrapper {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background-color: #ffffff;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        overflow: hidden;
        margin: 2rem auto;
        max-width: 800px;
      }

      trix-toolbar .trix-button-group {
        border: none;

      }

      trix-toolbar .trix-button:hover {
        background-color: #f1f2f2;
        border-radius: 8px;
      }

      trix-editor {
        border: none !important; 
        padding: 1.5rem !important;
        min-height: 250px;
        outline: none !important;
        line-height: 1.6;
        color: #334155;
        background-color: aliceblue;
        width: 628px;
      }


      trix-editor:empty:not(:focus)::before {
        color: #94a3b8;
      }

      trix-editor:invalid {
        border: solid 1px red;
      }

      #output {
        margin: 1rem 0 0;
      }

      #output textarea {
        width: 100%;
        height: 6rem;
        resize: vertical;
        font-family: monospace;
        border-radius: 5px;
        border: solid 1px #444;
        padding: 10px;
      }
    </style>
    <script type="module" src="trix.esm.js"></script>
    <script type="module" src="inspector.js"></script>
    <script type="module">
      Trix.config.attachments.preview.caption.name = true
      Trix.config.attachments.preview.caption.size = false

      // document.addEventListener("trix-initialize", function(event) {
      //   Trix.Inspector.install(event.target);
      // });

      document.addEventListener("trix-attachment-add", function(event) {
        var attachment = event.attachment;
        if (attachment.file) {
          var xhr = new XMLHttpRequest;
          xhr.open("POST", "/attachments", true);

          xhr.upload.onprogress = function(event) {
            var progress = event.loaded / event.total * 100;
            attachment.setUploadProgress(progress);
          };

          xhr.onload = function() {
            if (xhr.status === 201) {
              setTimeout(function() {
                var url = xhr.responseText;
                attachment.setAttributes({ url: url, href: url });
              }, 30)
            }
          };

          attachment.setUploadProgress(10);

          setTimeout(function() {
            xhr.send(attachment.file);
          }, 30)
        }
      });
    </script>
  </head>
  <body>
    <main>
      <div id="trix-editor-wrapper">
        <trix-editor autofocus class="trix-content" input="input"></trix-editor>
        <!-- <details id="output">
          <summary>Output</summary>
          <textarea readonly id="input"></textarea>
        </details> -->
      </div>
    </main>
  </body>
</html>
