    <script type="module">
      Trix.config.attachments.preview.caption.name = true
      Trix.config.attachments.preview.caption.size = false
      document.addEventListener("trix-attachment-add", function(event) {
        var attachment = event.attachment;
        if (attachment.file) {
          var xhr = new XMLHttpRequest;
          xhr.open("POST", "/attachments", true);

          xhr.upload.onprogress = function(event) {
            var progress = event.loaded / event.total * 100;
            attachment.setUploadProgress(progress);
          };

          xhr.onload = function() {
            if (xhr.status === 201) {
              setTimeout(function() {
                var url = xhr.responseText;
                attachment.setAttributes({ url: url, href: url });
              }, 30)
            }
          };

          attachment.setUploadProgress(10);

          setTimeout(function() {
            xhr.send(attachment.file);
          }, 30)
        }
      });
    </script>
  </head>


  <body>

        </symbol>

        <!-- ORDERED LIST -->
        <symbol id="icon-number-list" viewBox="0 0 24 24">

    <header class="app-navbar">
        <trix-toolbar id="my-toolbar">
            <div class="trix-button-row">
                <span></span>
                <span class="trix-button-group trix-button-group--history-tools">
                    <button type="button" class="trix-button trix-button--icon-undo" data-trix-action="undo" data-trix-key="z" title="Undo" tabindex="-1"><svg class="icon"><use href="#icon-undo"></use></svg></button>
                    <button type="button" class="trix-button trix-button--icon-redo" data-trix-action="redo" data-trix-key="shift+z" title="Redo" tabindex="-1"><svg class="icon"><use href="#icon-redo"></use></svg></button>
                </span>
                
                <span class="trix-button-group trix-button-group--text-tools">
                    <button type="button" class="trix-button trix-button--icon-bold" data-trix-attribute="bold" data-trix-key="b" title="Bold" tabindex="-1"><svg class="icon"><use href="#icon-bold"></use></svg></button>
                    <button type="button" class="trix-button trix-button--icon-italic" data-trix-attribute="italic" data-trix-key="i" title="Italic" tabindex="-1"><svg class="icon"><use href="#icon-italic"></use></svg></button>
                    <button type="button" class="trix-button trix-button--icon-strike" data-trix-attribute="strike" title="Strikethrough" tabindex="-1"><svg class="icon"><use href="#icon-strike"></use></svg></button>
                    <button type="button" class="trix-button trix-button--icon-link" data-trix-action="link" data-trix-key="k" title="Link" tabindex="-1"><svg class="icon"><use href="#icon-link"></use></svg></button>
                </span>

                <span class="trix-button-group trix-button-group--block-tools">
                    <button type="button" class="trix-button trix-button--icon-heading-1" data-trix-attribute="heading1" title="Heading" tabindex="-1"><svg class="icon"><use href="#icon-heading"></use></svg></button>
                    <button type="button" class="trix-button trix-button--icon-bullet-list" data-trix-attribute="bullet" title="Bullets" tabindex="-1"><svg class="icon"><use href="#icon-bullet-list"></use></svg></button>
                    <button type="button" class="trix-button trix-button--icon-number-list" data-trix-attribute="number" title="Numbers" tabindex="-1"><svg class="icon"><use href="#icon-number-list"></use></svg></button>
                </span>
                <span></span>
            </div>

            <div class="trix-dialogs" data-trix-attribute="link" data-trix-dialog="link">
                <div class="trix-dialog trix-dialog--link">
                    <input type="url" name="href" class="trix-input trix-input--dialog" placeholder="Enter a URL..." aria-label="URL" required>
                    <div class="trix-button-group">
                    <input type="button" class="trix-button trix-button--dialog" value="Link" data-trix-method="setAttribute">
                    <input type="button" class="trix-button trix-button--dialog" value="Unlink" data-trix-method="removeAttribute">
                    </div>
                </div>
            </div>
        </trix-toolbar>
    </header>
    <main>
      <div id="trix-editor-wrapper">
        <trix-editor toolbar="my-toolbar" autofocus class="trix-content" input="input"></trix-editor>
        <!-- <details id="output">
          <summary>Output</summary>
          <textarea readonly id="input"></textarea>
        </details> -->
      </div>
    </main>
